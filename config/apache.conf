# Portal A12 — Apache custom config
# Aplicado via Dockerfile em todos os ambientes

# Aumenta limite de headers (padrão 8190 é insuficiente com cookies grandes)
LimitRequestFieldSize 32768
LimitRequestLine 16384

# ---------------------------------------------------------------
# Timeout de conexão — explicito para bater com max_execution_time do
# PHP (600s, ver config/php.ini) e o idle_timeout do ALB de DEV (600s).
# Sem isso, ficamos dependendo do default do pacote apache2 (nao
# documentado aqui). Necessário porque updates de plugin com
# wp-content/plugins em EFS/NFS (DEV) levam ~80-90s cada e nao podem
# ser cortados no meio. Ver /memories/repo/a12-bugs-resolved.md.
# ---------------------------------------------------------------
Timeout 600

# ---------------------------------------------------------------
# MPM Prefork — dimensionado para ECS Fargate 1024 CPU / 2048 MB
# Cada worker PHP-WP usa ~55 MB → 30 workers = ~1.65 GB
# Mantém capacidade para health check + admin + scripts de migração
# simultâneos sem saturar.
# ---------------------------------------------------------------
<IfModule mpm_prefork_module>
    StartServers          4
    MinSpareServers       4
    MaxSpareServers       8
    MaxRequestWorkers    30
    ServerLimit          30
    MaxConnectionsPerChild 1000
</IfModule>

# ---------------------------------------------------------------
# Limita conexões simultâneas por IP para /wp-json/
# Evita que scripts de importação esgotem todos os workers.
# Máx 6 conexões simultâneas por IP na REST API.
# ---------------------------------------------------------------
<IfModule mod_reqtimeout.c>
    RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500
</IfModule>

# ---------------------------------------------------------------
# KeepAlive — reutiliza conexões HTTP
# ---------------------------------------------------------------
KeepAlive On
KeepAliveTimeout 5
MaxKeepAliveRequests 100

# ---------------------------------------------------------------
# Compressão — reduz tamanho das respostas
# ---------------------------------------------------------------
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/css \
        text/javascript application/javascript application/json \
        application/xml text/xml image/svg+xml
</IfModule>

# ---------------------------------------------------------------
# Cache de arquivos estáticos no browser
# ---------------------------------------------------------------
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType image/webp        "access plus 1 year"
    ExpiresByType image/jpeg        "access plus 1 year"
    ExpiresByType image/png         "access plus 1 year"
    ExpiresByType image/svg+xml     "access plus 1 year"
    ExpiresByType text/css          "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
</IfModule>
