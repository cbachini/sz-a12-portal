# Portal A12 — VirtualHost HTTPS local
# Cert auto-assinado gerado no Dockerfile (válido 10 anos)
# Acesse: https://localhost:8443 ou https://wordpress.sz-a12-portal.orb.local:8443

<IfModule mod_ssl.c>

    <VirtualHost *:443>
        ServerName wordpress.sz-a12-portal.orb.local
        ServerAlias localhost

        DocumentRoot /var/www/html

        SSLEngine             on
        SSLCertificateFile    /etc/apache2/ssl/a12-local.crt
        SSLCertificateKeyFile /etc/apache2/ssl/a12-local.key

        # Segurança TLS moderna
        SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
        SSLCipherSuite        HIGH:!aNULL:!MD5
        SSLHonorCipherOrder   on

        <Directory /var/www/html>
            Options FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        # Headers de segurança
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"

        ErrorLog  ${APACHE_LOG_DIR}/ssl-error.log
        CustomLog ${APACHE_LOG_DIR}/ssl-access.log combined
    </VirtualHost>
</IfModule>
