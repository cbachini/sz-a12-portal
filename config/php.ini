; Portal A12 — PHP customizado
; Aplicado em todos os ambientes via Dockerfile

; ---------------------------------------------------------------
; Limites (adequados para importação de mídia e posts em batch)
; ---------------------------------------------------------------
upload_max_filesize = 256M
post_max_size       = 256M
memory_limit        = 512M
max_execution_time  = 300
max_input_time      = 300
max_input_vars      = 5000

; ---------------------------------------------------------------
; Sessão
; ---------------------------------------------------------------
session.gc_maxlifetime = 3600

; ---------------------------------------------------------------
; Fuso horário
; ---------------------------------------------------------------
date.timezone = America/Sao_Paulo

; ---------------------------------------------------------------
; Segurança
; ---------------------------------------------------------------
expose_php         = Off
display_errors     = Off
log_errors         = On
error_log          = /var/log/apache2/php-error.log

; Em LOCAL: ative display_errors para facilitar debug
; (sobrescreva via WORDPRESS_DEBUG no docker-compose)
