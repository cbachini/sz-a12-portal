; Portal A12 — PHP customizado
; Aplicado em todos os ambientes via Dockerfile

; ---------------------------------------------------------------
; Limites (adequados para importação de mídia e posts em batch)
; ---------------------------------------------------------------
upload_max_filesize = 256M
post_max_size       = 256M
memory_limit        = 512M
; 600s (era 300s): updates de plugin em ambientes com wp-content/plugins em
; EFS/NFS (DEV) sao lentos por natureza (latencia de metadados por arquivo,
; nao por CPU) — medido ~80-90s por plugin com poucas centenas de arquivos.
; Margem maior evita timeout do PHP no meio de um update multiplo/bulk.
; Ver /memories/repo/a12-bugs-resolved.md.
max_execution_time  = 600
max_input_time      = 600
max_input_vars      = 5000

; ---------------------------------------------------------------
; Sessão
; ---------------------------------------------------------------
session.gc_maxlifetime = 3600

; ---------------------------------------------------------------
; Fuso horário
; ---------------------------------------------------------------
date.timezone = America/Sao_Paulo

; ---------------------------------------------------------------
; Segurança
; ---------------------------------------------------------------
expose_php         = Off
display_errors     = Off
log_errors         = On
error_log          = /var/log/apache2/php-error.log

; Em LOCAL: ative display_errors para facilitar debug
; (sobrescreva via WORDPRESS_DEBUG no docker-compose)

; ---------------------------------------------------------------
; Limite de descritores de arquivo (previne "Too many open files")
; ---------------------------------------------------------------
; (definido via ulimits no docker-compose)

; ---------------------------------------------------------------
; APCu — cache em memória para user data e autoload
; ---------------------------------------------------------------
[apc]
apc.enabled      = 1
apc.shm_size     = 64M
apc.ttl          = 3600
apc.gc_ttl       = 3600
apc.entries_hint = 4096
